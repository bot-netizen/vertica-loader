
vertica:
  host: localhost       # any node / vip to connect to
  port: 5433
  user: dbadmin
  password: "....."
  database: verticadb     # pre-created by you
  connection_timeout: 3600
  tlsmode: disable        # server has no TLS; use a plain connection (trusted network)

cluster:
  ssh_user: dbadmin
  nodes:                  # ssh_host = OS host, db_node = Vertica node name
    - {ssh_host: ..., db_node: v_verticadb_node0001}
    - {ssh_host: ..., db_node: v_verticadb_node0002}
    - {ssh_host: , db_node: ...v_verticadb_node0003}

paths:
  source_dir: /home/dbadmin/data               # where the .tar.gz files land on each node
  backup_dir: /home/dbadmin/data/backup        # loaded archives moved here (+.archived suffix)
  file_glob: "*.tar.gz"                        # each archive = ~300 headerless TSV members

schema:
  target_schema: weather_db          # weather_fact / weather_station live here
  schema_files: ./schemas        # DDL applied at setup (create_tables.sql)

load:
  target_table: weather_fact     # fact table
  reject_table: weather_fact_rej # bad-row capture (per-stream tables named rejectted_<stream>)
  audit_table:  load_audit       # per-archive load history

  # Delimiter is placed inside a Vertica E'...' literal. Use \\t for TAB.
  delimiter: "\\t"

  # Bad-record limit (COPY REJECTMAX). An archive tolerates up to this many
  # rejected rows and still commits; reaching the limit aborts the COPY and rolls
  # the whole archive back. 0 = unlimited (never fail on bad rows alone).
  max_bad_records: 50

  # Skip already-loaded files by checking the audit table (idempotency).
  # Set to false ONLY for testing when you want to reload the same files
  # repeatedly — it disables the duplicate check entirely.
  # false = always load, true = never load duplicate files
  check_duplicates: false

  # How many archives to load at once globally. Each runs in its own thread with its own
  # connection to the node that holds the file (that node becomes the COPY
  # initiator, so parse work spreads across the cluster). Defaults to the number
  # of cluster nodes if unset.
  max_parallel_loads: 3

dimension:                       # small replicated mapping table (unsegmented all nodes)
  enabled: true
  table: weather_station
  ssh_host: ....                 # node that holds the .tsv
  file: /home/dbadmin/data/weather_station.tsv
  delimiter: "\\t"
  skip: 1                        # file has a header row
